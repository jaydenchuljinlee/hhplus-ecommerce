spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate # 프로덕션: DDL 변경 금지, 스키마 검증만 수행
    show-sql: false
  sql:
    init:
      mode: never # 프로덕션: SQL 초기화 스크립트 실행 안 함
  data:
    mongodb:
      uri: ${MONGODB_URI}
      database: ${MONGODB_DATABASE}
  cache:
    cache-names: productCache
    redis:
      time-to-live: 86400000
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
    consumer:
      group-id: hhplus-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus
  endpoint:
    health:
      show-details: never # 프로덕션: 헬스 상세 정보 비공개

logging:
  level:
    root: WARN
    com.hhplus.ecommerce: INFO

hhplus:
  kafka:
    balance:
      group-id: OUTBOX
      topic: BALANCE_HISTORY
    payment:
      group-id: OUTBOX
      topic: PAY_HISTORY
    product:
      group-id: OUTBOX
      topic: PRODCUT_STOCK
    order:
      group-id: OUTBOX
      topic: ORDER_STOCK_FAIL
