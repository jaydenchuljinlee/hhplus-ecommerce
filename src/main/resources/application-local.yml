spring:
  datasource:
    url: jdbc:mysql://localhost:3306/hhplus?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ironjin
    password: 1234
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 100
      minimum-idle: 20
      connection-timeout: 5000
      idle-timeout: 600000
      max-lifetime: 1800000
  sql:
    init:
      mode: always
  data:
    mongodb:
      uri: mongodb://ironjin:1234@localhost:27017/hhplus?authSource=admin
      database: hhplus
  cache:
    cache-names: productCache
    redis:
      time-to-live: 86400000 # 1 day in milliseconds
  kafka:
    bootstrap-servers: localhost:9093
    consumer:
      group-id: hhplus-group
      auto-offset-reset: earliest
      enable-auto-commit: false            # Q68: manual commit 전환
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
        session.timeout.ms: 30000          # Q66: Consumer 장애 감지 시간 (기본 45s → 30s)
        heartbeat.interval.ms: 10000       # Q66: Heartbeat 주기 (session.timeout의 1/3)
        max.poll.interval.ms: 300000       # Q66: 최대 처리 허용 시간
        max.poll.records: 500              # Q66: 한 번에 가져올 최대 레코드 수
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all                            # Q69: Leader + 모든 ISR 수신 확인 후 성공 처리
      properties:
        enable.idempotence: true           # Q69: Producer 재전송 시 중복 발행 방지
        max.in.flight.requests.per.connection: 5  # Q69: idempotence=true와 호환 기본값
    listener:
      ack-mode: manual_immediate           # Q68: acknowledge() 호출 즉시 offset commit
      observation-enabled: true           # Q70: Consumer Lag 메트릭 Micrometer 연동

hhplus:
  kafka:
    balance:
      group-id: OUTBOX
      topic: BALANCE_HISTORY
    payment:
      group-id: OUTBOX
      topic: PAY_HISTORY
    notification:
      group-id: OUTBOX
      topic: NOTIFICATION