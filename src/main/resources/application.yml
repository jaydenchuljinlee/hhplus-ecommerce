spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  sql:
    init:
      # schema-locations: classpath:sql/database-scheme.sql
      data-locations: classpath:sql/database-data.sql
      encoding: UTF-8
      mode: always

  jpa:
    defer-datasource-initialization: true
    show-sql: false
    properties:
      hibernate:
        format_sql: true
    hibernate:
      ddl-auto: create

jwt:
  # 환경변수 JWT_SECRET_KEY 미설정 시 로컬 개발용 기본값 사용 (운영 배포 시 반드시 환경변수로 주입)
  secretKey: ${JWT_SECRET_KEY:local-dev-only-not-for-production-change-me}

management:
  endpoints:
    web:
      exposure:
        # 운영 안전 기본값: 필요한 엔드포인트만 노출 (로컬 개발은 application-local.yml에서 확장)
        include: health,info,metrics,prometheus
  endpoint:
    metrics:
      enabled: true
    health:
      show-details: when-authorized
  metrics:
    enable:
      all: true


logging:
  level:
    root: INFO                    # 기본 로그 레벨 (INFO)
    # org.hibernate.SQL: DEBUG
    org.springframework.web: DEBUG # 특정 패키지에 대한 로그 레벨 (예: Spring MVC 관련)
    com.hhplus.ecommerce: DEBUG